name: stg-id-uploader
services:
  stg_id_uploader:
    image: stg_id_uploader:latest
    container_name: stg_id_uploader
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - ENV_FILE=.env.stg_id_uploader.local
    restart: unless-stopped

    # Resource Limits
    mem_limit: 512m
    cpus: '0.5'

    # Environment
    env_file:
      - .env.stg_id_uploader.local

    # Ports
    expose:
      - '${PORT}'

    # Volumes
    volumes:
      - ./public:/app/public

    # Logging
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'

    # Networks
    networks:
      - app_network

networks:
  app_network:
    external: true
    name: ${DOCKER_NETWORK_NAME}
